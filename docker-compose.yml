services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vatdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vatdesk}
      POSTGRES_DB: ${POSTGRES_DB:-vatdesk}
    volumes:
      - vatdesk-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vatdesk}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-vatdesk};Username=${POSTGRES_USER:-vatdesk};Password=${POSTGRES_PASSWORD:-vatdesk}"
      # No fallback here on purpose (security checklist #11: no secrets in git). Unlike the
      # Postgres credentials above, a JWT signing key lets anyone who has it forge Admin
      # tokens against any deployment that reuses it — a committed default, even a
      # "demo-only" one, is a real usable secret. Copy .env.example to .env and set a real
      # generated JWT_KEY (`openssl rand -base64 48`) before running `docker compose up`;
      # Program.cs fails fast with a clear message if it's missing or too short.
      Jwt__Key: "${JWT_KEY}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  vatdesk-postgres-data:
